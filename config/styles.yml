styles:

  timeless_minimalist_sans:
    summary: "Clean, modern, and high-end sans-serif aesthetic with focus on negative space."
    categories: [wisdom, morning, mindfulness]
    weight: high
    description: >
      A high-end, cinematic lifestyle photograph. 
      The scene must be ultra-clean, minimalist, and high-resolution.
      Examples: A single cup of coffee on a textured stone table in soft morning light; 
      a lone person walking on a misty beach; a minimalist modern architectural detail.
      Vibe: Quiet luxury, intentional, and calm.
    rendering:
      font: inter
      text_color: "#FFFFFF"
      highlight_color: "#FFFFFF"
      author_color: "#F0F0F0"
      overlay: {type: gradient_bottom, opacity: 120, color: "#000000", blur: 0}
      text_zone: center_minimalist
      layout: minimalist
      decoration: none
      highlight_style: none
      voice_gender: female

  timeless_minimalist_serif:
    summary: "Classic, elegant serif typography on dark, moody, or artistic backgrounds."
    categories: [wisdom, mindfulness, love]
    weight: high
    description: >
      A moody, artistic, and cinematic photograph with deep shadows and rich textures.
      Examples: A vintage library with soft light hitting old books; a dark mountain range under a starry sky;
      a high-end restaurant interior with candlelight.
      Vibe: Intellectual, timeless, and sophisticated.
    rendering:
      font: spectral
      text_color: "#FFFFFF"
      highlight_color: "#FFFFFF"
      author_color: "#E0E0E0"
      overlay: {type: vignette, opacity: 140, color: "#000000", blur: 0}
      text_zone: center
      layout: big_center
      decoration: none
      highlight_style: none
      voice_gender: male

  minimalist_doodle_wisdom:
    summary: "2D minimalist digital illustration with clean typography in the negative space at the top."
    categories: [wisdom, womenpower, morning]
    weight: high
    description: >
      A clean, 2D minimalist digital illustration. 
      Style: Flat art, soft pastel or earth-tone palette, simple lines.
      Subject: A person engaging in a simple activity (drinking coffee, walking, looking at a mirror, working).
      Background: Simple, solid-color or very clean background area at the top of the frame for text.
      Vibe: Relatable, modern, and lighthearted.
    rendering:
      font: jost
      text_color: "#1A1A1A"
      highlight_color: "#1A1A1A"
      author_color: "#4A4A4A"
      overlay: {type: none, opacity: 0, color: "#000000", blur: 0}
      text_zone: top_minimalist
      layout: minimalist
      decoration: none
      highlight_style: none
      voice_gender: female

  elegant_illustrated_portrait:
    summary: "Soft digital painting/illustration with elegant handwritten script fonts."
    categories: [love, womenpower, wisdom]
    weight: high
    description: >
      A soft, beautiful digital painting or stylized illustration.
      Style: Flat 2D minimalist art, soft edges, rich colors.
      Subject: A woman in a stylish outfit, or a scene of connection.
      Background: Artistic but with a large, clean, solid-color area at the top for text.
      Vibe: Emotive, artistic, and premium.
    rendering:
      font: satisfy
      text_color: "#1A1A1A"
      highlight_color: "#1A1A1A"
      author_color: "#333333"
      overlay: {type: none, opacity: 0, color: "#000000", blur: 0}
      text_zone: top_minimalist
      layout: asymmetric
      decoration: none
      highlight_style: none
      voice_gender: female

  indian_ethnic_aesthetic:
    summary: "Diverse Indian women in authentic, high-fashion settings. Now ultra-minimalist."
    categories: [wisdom, love, womenpower]
    weight: high
    description: >
      A high-end, cinematic illustration or photograph of a woman in India.
      Scenes: Modern sunlit offices, quiet Himalayan balconies, or lush tea gardens.
      Subject: An expressive, modern Indian woman in elegant attire.
      Composition: Ensure a large, clean, high-contrast area at the top for dark text.
      Vibe: Authentic, powerful, and serene.
    rendering:
      font: playfair
      text_color: "#1A1A1A"
      highlight_color: "#1A1A1A"
      author_color: "#333333"
      overlay: {type: none, opacity: 0, color: "#FFFFFF", blur: 0}
      text_zone: top_minimalist
      layout: big_center
      decoration: none
      highlight_style: none
      voice_gender: female

  avant_garde_lifestyle:
    summary: "High-fashion 'Ramp' style; structural clothing and minimalist settings. Now ultra-clean."
    categories: [wisdom, morning, womenpower, love]
    weight: high
    description: >
      A cutting-edge, high-fashion illustration or clean photograph.
      Setting: Minimalist architectural spaces, brutalist concrete, or stark white runways.
      Subject: A person in a structural outfit with an expressive pose.
      Composition: Ensure a large, clean, shadowed area at the top for white text overlay.
      Vibe: Bold, structural, and ultra-modern.
    rendering:
      font: outfit
      text_color: "#FFFFFF"
      highlight_color: "#FFFFFF"
      author_color: "#F0F0F0"
      overlay: {type: gradient_top, opacity: 120, color: "#000000", blur: 0}
      text_zone: top_minimalist
      layout: big_center
      decoration: none
      highlight_style: none
      voice_gender: female

  quiet_luxury_minimalist:
    summary: "High-end 'Old Money' aesthetic; minimalist luxury interiors. Ultra-clean negative space."
    categories: [wisdom, morning, mindfulness]
    weight: high
    description: >
      An understated, high-end 'Quiet Luxury' illustration or photograph.
      Scenes: Sun-drenched minimalist interiors with large windows and soft linen textures.
      Subject: A single object or a person in a calm, reflective moment.
      Composition: Focus on negative space and clean backgrounds for dark text.
      Vibe: Wealthy, calm, and perfectly curated.
    rendering:
      font: spectral
      text_color: "#1A1A1A"
      highlight_color: "#1A1A1A"
      author_color: "#4A4A4A"
      overlay: {type: none, opacity: 0, color: "#FFFFFF", blur: 0}
      text_zone: top_minimalist
      layout: minimalist
      decoration: none
      highlight_style: none
      voice_gender: female
