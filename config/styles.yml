styles:

  timeless_minimalist_sans:
    summary: "Clean, modern, and high-end sans-serif aesthetic with focus on negative space."
    categories: [wisdom, morning, mindfulness]
    weight: high
    description: >
      A high-end, cinematic lifestyle photograph shot on a 35mm lens. 
      The scene must be ultra-clean, minimalist, and hyper-realistic.
      Examples: A single cup of coffee on a textured stone table in soft morning light with volumetric dust motes; 
      a lone silhouette walking on a vast, misty beach at dawn; minimalist modern architectural detail with harsh geometric shadows.
      Vibe: Quiet luxury, intentional, and calm.
    rendering:
      font: poppins
      text_color: "#FFFFFF"
      highlight_color: "#FFFFFF"
      author_color: "#F0F0F0"
      overlay: {type: gradient_bottom, opacity: 180, color: "#000000", blur: 0}
      text_zone: center_minimalist
      layout: minimalist
      decoration: none
      highlight_style: underline
      voice_gender: female

  timeless_minimalist_serif:
    summary: "Classic, elegant serif typography on dark, moody, or artistic backgrounds."
    categories: [wisdom, mindfulness, love]
    weight: high
    description: >
      A moody, artistic, and cinematic photograph with deep shadows and rich textures. Shot on an 85mm lens with shallow depth of field.
      Examples: A vintage library with soft rim light hitting old leather books; a dark, jagged mountain range under a vast starry sky;
      a high-end restaurant interior with single flickering candlelight and heavy shadows.
      Vibe: Intellectual, timeless, and sophisticated.
    rendering:
      font: spectral
      text_color: "#FFFFFF"
      highlight_color: "#FFFFFF"
      author_color: "#E0E0E0"
      overlay: {type: vignette, opacity: 180, color: "#000000", blur: 0}
      text_zone: center
      layout: big_center
      decoration: none
      highlight_style: underline
      voice_gender: male

  minimalist_doodle_wisdom:
    summary: "2D minimalist digital illustration with clean typography in the negative space at the top."
    categories: [wisdom, womenpower, morning]
    weight: high
    description: >
      A clean, 2D minimalist digital illustration with premium textures. 
      Style: Flat art, soft pastel or earthy desert-tone palette, clean vector lines with subtle grain.
      Subject: A solitary figure engaging in a simple, mindful activity (pouring tea, looking at the moon, meditative pose).
      Background: Simple, solid-color or very clean background area with VAST negative space at the top for text.
      Vibe: Relatable, modern, and lighthearted but high-end.
    rendering:
      font: montserrat
      text_color: "#1A1A1A"
      highlight_color: "#1A1A1A"
      author_color: "#4A4A4A"
      overlay: {type: none, opacity: 0, color: "#000000", blur: 0}
      text_zone: top_minimalist
      layout: minimalist
      decoration: none
      highlight_style: underline
      voice_gender: female

  elegant_illustrated_portrait:
    summary: "Soft digital painting with elegant plain typography (formerly script)."
    categories: [love, womenpower, wisdom]
    weight: high
    description: >
      A soft, beautiful digital painting or stylized illustration with cinematic lighting.
      Style: Modern flat 2D minimalist art with rich, harmonious colors and soft-box lighting feel.
      Subject: A woman in a stylish outfit or a silhouette of connection.
      Background: Artistic but with a large, clean, solid-color area at the top for text.
      Vibe: Emotive, artistic, and premium.
    rendering:
      font: outfit
      text_color: "#1A1A1A"
      highlight_color: "#1A1A1A"
      author_color: "#333333"
      overlay: {type: none, opacity: 0, color: "#000000", blur: 0}
      text_zone: top_minimalist
      layout: asymmetric
      decoration: none
      highlight_style: underline
      voice_gender: female

  indian_ethnic_aesthetic:
    summary: "Diverse Indian women in authentic, high-fashion settings. Now ultra-minimalist."
    categories: [wisdom, love, womenpower]
    weight: high
    description: >
      A high-end, cinematic illustration or photograph of a woman in India. Shot on 35mm film with warm golden tones.
      Scenes: Modern sunlit offices with massive windows, quiet Himalayan balconies overlooking mist, or lush tea gardens.
      Subject: An expressive, modern Indian woman in elegant, structural attire.
      Composition: Ensure a large, clean, high-contrast area at the top for dark text overlay.
      Vibe: Authentic, powerful, and serene.
    rendering:
      font: inter
      text_color: "#1A1A1A"
      highlight_color: "#1A1A1A"
      author_color: "#333333"
      overlay: {type: none, opacity: 0, color: "#FFFFFF", blur: 0}
      text_zone: top_minimalist
      layout: big_center
      decoration: none
      highlight_style: underline
      voice_gender: female

  avant_garde_lifestyle:
    summary: "High-fashion 'Ramp' style; structural clothing and minimalist settings. Now ultra-clean."
    categories: [wisdom, morning, womenpower, love]
    weight: high
    description: >
      A cutting-edge, high-fashion illustration or clean photograph. Brutalist aesthetic.
      Setting: Minimalist architectural spaces, brutalist concrete, or stark white runways with dramatic shadows.
      Subject: A person in a structural outfit with an expressive, editorial pose.
      Composition: Ensure a large, clean, shadowed area at the top for white text overlay.
      Vibe: Bold, structural, and ultra-modern.
    rendering:
      font: inter
      text_color: "#FFFFFF"
      highlight_color: "#FFFFFF"
      author_color: "#F0F0F0"
      overlay: {type: gradient_top, opacity: 180, color: "#000000", blur: 0}
      text_zone: top_minimalist
      layout: big_center
      decoration: none
      highlight_style: underline
      voice_gender: female

  quiet_luxury_minimalist:
    summary: "High-end 'Old Money' aesthetic; minimalist luxury interiors. Ultra-clean negative space."
    categories: [wisdom, morning, mindfulness]
    weight: high
    description: >
      An understated, high-end 'Quiet Luxury' illustration or photograph. Soft, diffused lighting.
      Scenes: Sun-drenched minimalist interiors with large windows and soft linen textures; a single high-end watch or book on a marble slab.
      Subject: A single object or a person (back-view) in a calm, reflective moment.
      Composition: Focus on VAST negative space and clean backgrounds for dark text.
      Vibe: Wealthy, calm, and perfectly curated.
    rendering:
      font: spectral
      text_color: "#1A1A1A"
      highlight_color: "#1A1A1A"
      author_color: "#4A4A4A"
      overlay: {type: none, opacity: 0, color: "#FFFFFF", blur: 0}
      text_zone: top_minimalist
      layout: minimalist
      decoration: none
      highlight_style: underline
      voice_gender: female

  # ---------------------------------------------------------------------------
  # Artistic & Illustrative (Inspiration from user screenshots)
  # ---------------------------------------------------------------------------

  artistic_bold_impact:
    summary: "Massive, high-contrast all-caps sans-serif. Scroll-stopping."
    categories: [morning, wisdom, love, womenpower, mindfulness, darkacademia, latenight]
    weight: high
    description: >
      A high-contrast, professional studio portrait or a bold architectural shot with a flat, light background.
      Clean, sharp, and modern. Designed to make the black text pop. Vibe is aggressive and powerful.
    rendering:
      font: raleway
      text_color: "#000000"
      highlight_color: "#000000"
      author_color: "#333333"
      overlay: {type: none, opacity: 0, color: "#000000", blur: 0}
      text_zone: center_minimalist
      layout: minimalist
      decoration: none
      highlight_style: underline
      voice_gender: male

  artistic_cinematic_minimal:
    summary: "Tiny, elegant serif in the center of a vast landscape."
    categories: [morning, wisdom, love, womenpower, mindfulness, darkacademia, latenight]
    weight: high
    description: >
      A breathtaking, moody cinematic landscape (misty forests, rainy streets, vast oceans). Shot on 35mm film.
      High-end cinematography feel with deep shadows and rim lighting. The text should feel like a small, deep thought in a big world.
    rendering:
      font: spectral
      text_color: "#FFFFFF"
      highlight_color: "#FFFFFF"
      author_color: "#CCCCCC"
      overlay: {type: vignette, opacity: 180, color: "#000000", blur: 0}
      text_zone: center_minimalist
      layout: minimalist
      decoration: none
      highlight_style: underline
      voice_gender: male

  artistic_spiritual_mixed:
    summary: "Elegant plain typography with decorative elements (formerly mixed script)."
    categories: [morning, wisdom, love, womenpower, mindfulness, darkacademia, latenight]
    weight: high
    description: >
      A warm, illustrative scene (watercolor or digital painting) of a figure in a sunlit garden or a cozy room.
      The aesthetic should be 'earthy' and 'soulful' with volumetric lighting and soft textures.
    rendering:
      font: outfit
      text_color: "#1A1A1A"
      highlight_color: "#1A1A1A"
      author_color: "#4A4A4A"
      overlay: {type: none, opacity: 0, color: "#000000", blur: 0}
      text_zone: center_minimalist
      layout: minimalist
      decoration: quote_mark
      highlight_style: underline
      voice_gender: female

  # ---------------------------------------------------------------------------
  # Surreal Minimalist (Next-Level Engagement)
  # ---------------------------------------------------------------------------

  surreal_cosmic_minimalism:
    summary: "Floating geometric orbs and impossible cosmic phenomena in vast, empty landscapes."
    categories: [wisdom, mindfulness, latenight]
    weight: high
    description: >
      A surreal, high-end editorial photograph of a massive, glowing geometric orb (gold or glass) floating silently over a black sand desert at twilight.
      Atmosphere: Volumetric fog, soft amber rim lighting, vast starry sky with a faint nebula.
      Composition: Central subject with VAST negative space. Hyper-realistic textures.
      Vibe: Transcendent, mysterious, and awe-inspiring.
    rendering:
      font: montserrat
      text_color: "#FFFFFF"
      highlight_color: "#FFFFFF"
      author_color: "#CCCCCC"
      overlay: {type: gradient_bottom, opacity: 180, color: "#000000", blur: 0}
      text_zone: center_minimalist
      layout: minimalist
      decoration: none
      highlight_style: underline
      voice_gender: male

  metaphorical_abstract_installation:
    summary: "Impossible art installations in natural settings. Visual metaphors for the mind."
    categories: [wisdom, mindfulness, darkacademia]
    weight: high
    description: >
      A cinematic photograph of a surreal art installation in a misty forest. 
      Examples: A series of glowing glass doorways leading into a void; a massive floating stone block tethered by golden threads.
      Lighting: Soft-box lighting feel, volumetric rays of light through trees, deep shadows.
      Vibe: Intellectual, metaphorical, and high-production value.
    rendering:
      font: cormorant
      text_color: "#FFFFFF"
      highlight_color: "#FFFFFF"
      author_color: "#F0F0F0"
      overlay: {type: vignette, opacity: 180, color: "#000000", blur: 0}
      text_zone: bottom_left
      layout: asymmetric
      decoration: rule
      highlight_style: underline
      voice_gender: male

  dream_logic_architectural:
    summary: "Brutalist architecture in impossible, dream-like environments."
    categories: [morning, wisdom, latenight]
    weight: high
    description: >
      A stark, brutalist concrete structure rising out of a vast, calm ocean under a blood-red moon or a bright neon sun.
      Style: Architectural editorial, harsh geometric shadows, clean lines, minimalist color palette (concrete gray and one bold accent color).
      Composition: High-contrast, minimalist, focus on structural purity.
      Vibe: Bold, structural, and dream-like.
    rendering:
      font: oswald
      text_color: "#FFFFFF"
      highlight_color: "#FFFFFF"
      author_color: "#F0F0F0"
      overlay: {type: gradient_top, opacity: 180, color: "#000000", blur: 0}
      text_zone: top_minimalist
      layout: minimalist
      decoration: none
      highlight_style: underline
      voice_gender: female

  editorial_black_white_portrait:
    summary: "High-end Vogue-style black and white editorial photography of women."
    categories: [womenpower]
    weight: high
    description: >
      A high-end editorial black and white photograph of a woman in high-fashion attire (long coats, dark sunglasses, or minimalist chic).
      Setting: An elegant urban environment (NYC, Paris, or Milan).
      Lighting: Hard, high-contrast 'Chiaroscuro' lighting, dramatic shadows, sharp rim light.
      Medium: 35mm monochrome film with visible, artistic grain.
      Vibe: Empowering, sophisticated, and high-fashion.
      Composition: Focus on the subject's posture and movement (e.g., walking across a busy road or standing against a brutalist wall).
    rendering:
      font: raleway
      text_color: "#FFFFFF"
      highlight_color: "#FFFFFF"
      author_color: "#CCCCCC"
      overlay: {type: vignette, opacity: 200, color: "#000000", blur: 0}
      text_zone: bottom_minimalist
      layout: minimalist
      decoration: rule
      highlight_style: underline
      voice_gender: female

  street_style_editorial_bw:
    summary: "Cinematic black and white street-style fashion editorial."
    categories: [womenpower]
    weight: high
    description: >
      A cinematic, strictly black and white street photography shot of a fashionable woman (Parisian chic or NYC street style).
      Outfit: Loose-fit jeans with a turtleneck, or a mini skirt with a stylish top.
      Setting: A busy city street with natural movement and bokeh.
      Lighting: High-contrast monochrome, deep shadows, soft volumetric glow.
      Vibe: Relatable yet aspirational, emotional, and visually rich.
      Composition: Wide angle 35mm shot showing the environment and the subject's full outfit.
    rendering:
      font: caveat
      text_color: "#FFFFFF"
      highlight_color: "#FFFFFF"
      author_color: "#E0E0E0"
      overlay: {type: gradient_bottom, opacity: 180, color: "#000000", blur: 0}
      text_zone: top_minimalist
      layout: minimalist
      decoration: none
      highlight_style: underline
      voice_gender: female
