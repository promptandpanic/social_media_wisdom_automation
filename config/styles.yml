styles:

  studio_ghibli:
    summary: "Studio Ghibli Art. Lush, vibrant, colorful anime landscapes."
    categories: [wisdom, morning, mindfulness, love, latenight, womenpower, darkacademia]
    weight: high
    description: >
      Studio Ghibli style anime background art. Lush green landscapes, highly detailed volumetric clouds, 
      vibrant blue skies, and rich colorful environments. Extremely attention-grabbing, nostalgic, 
      and beautiful painterly anime aesthetic. Exploding with life, magic, and vibrant colors. 
      Ensure there is ample negative space and uncluttered sky or foreground to allow for clean text overlay.
    rendering:
      font: playfair
      font_variants: [playfair, cormorant, lora, merriweather, spectral, cinzel]
      text_color: "#FFFFFF"
      author_color: "#FFD700"
      overlay: {type: gradient_center, opacity: 160, color: "#000000", blur: 0}
      text_zone: center
      layout: big_center
      decoration: none
      voice_gender: female

  vibrant_minimalism:
    summary: "Vibrant Minimalism. Bold colors, clean lines, abundant negative space."
    categories: [wisdom, morning, mindfulness, love, latenight, womenpower, darkacademia]
    weight: high
    description: >
      Vibrant, highly saturated minimalist aesthetic. Bold, striking color palettes (like deep magenta, 
      electric orange, or vivid teal) paired with clean lines, liminal spaces, or vast empty architecture. 
      Visually dazzling and attention-grabbing while maintaining extreme simplicity. 
      Must feature massive amounts of negative space and perfectly clean areas for text overlay.
    rendering:
      font: cinzel
      font_variants: [cinzel, playfair, cormorant, lora]
      text_color: "#FFFFFF"
      author_color: "#FFD700"
      overlay: {type: gradient_bottom, opacity: 160, color: "#000000", blur: 0}
      text_zone: bottom_minimalist
      layout: minimalist
      decoration: none
      voice_gender: male

  vibrant_wildlife:
    summary: "Vibrant Wildlife. Lush jungles, savannas, magnificent wild animals."
    categories: [wisdom, morning, mindfulness, love, latenight, womenpower, darkacademia]
    weight: high
    description: >
      Vibrant wildlife and majestic nature aesthetic. Stunning, crystal-clear depictions of diverse and magnificent wild animals 
      (such as tigers, lions, panthers, elephants, hyenas, zebras, giraffes, various antelopes, kudus, wolves, hippos, rhinos, Amazon rainforest birds, and weird or unique looking animals) 
      in incredibly lush, deeply colorful environments ranging from deep dark jungles to vast savanna plains. 
      Extremely rich lighting, glowing sunlight, and highly saturated, attention-grabbing colors. 
      Must feature massive amounts of negative space—such as an empty misty background, soft depth-of-field, or an uncluttered dark foreground—to ensure text remains highly legible.
    rendering:
      font: lora
      font_variants: [lora, merriweather, spectral, playfair, cormorant]
      text_color: "#FFFFFF"
      author_color: "#FFD700"
      overlay: {type: gradient_top, opacity: 160, color: "#000000", blur: 0}
      text_zone: top_minimalist
      layout: asymmetric
      decoration: none
      voice_gender: female
