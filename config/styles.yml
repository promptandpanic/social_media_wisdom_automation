styles:

  indian_ethnic_aesthetic:
    summary: "Stunning Indian woman in a Saree with flowing open hair; highly attractive ethnic vibe"
    categories: [wisdom, love, womenpower]
    weight: high
    description: >
      A breathtaking, highly attractive Indian woman wearing a gorgeous Saree with flowing open hair. 
      Setting: A stunning, sun-drenched architectural courtyard, a palace balcony, or an elegant indoor space.
      Lighting: Soft natural light, golden hour, highly flattering and radiant.
    rendering:
      font: playfair
      text_color: "#FFFFFF"
      highlight_color: "#FFD700"
      author_color: "#F5F5F5"
      overlay: {type: glass, opacity: 80, color: "#000000", blur: 25}
      text_zone: bottom
      layout: big_center
      decoration: rule
      highlight_style: color
      voice_gender: female

  avant_garde_lifestyle:
    summary: "High-fashion 'Ramp' style; oversized/loose clothing, weird bags, and noticeable accessories"
    categories: [wisdom, morning, womenpower, love]
    weight: high
    description: >
      A cutting-edge, high-fashion lifestyle shot.
      Fashion: Oversized, minimalist 'Uniqlo-style' loose clothing. Artistic layering for women; structured streetwear for men.
      Accessories: Weirdly-shaped designer bags, chunky geometric glasses, and avant-garde accessories.
      Setting: Minimalist urban ramps or brutalist buildings.
    rendering:
      font: poppins
      text_color: "#FFFFFF"
      highlight_color: "#FFEB3B"
      author_color: "#FFFFFF"
      overlay: {type: glass, opacity: 70, color: "#000000", blur: 30}
      text_zone: center
      layout: big_center
      decoration: none
      highlight_style: italic
      voice_gender: female

  breathtaking_nature_vision:
    summary: "Epic 'Middle of Nowhere' landscapes; Canadian Rockies, desert dunes, yachts in ocean, snowy peaks"
    categories: [mindfulness, wisdom, morning]
    weight: high
    description: >
      Awe-inspiring 'Middle of Nowhere' nature photography.
      Scenes: The Canadian Rockies at sunrise, a misty empty road in the rain, vast desert dunes under a starry sky, 
      a sleek white yacht in the middle of a crystal-clear turquoise ocean, or a lone figure atop a massive snow-capped mountain.
      Lighting: Breathtaking, cinematic lighting—ranging from misty rain to vibrant golden hour.
      Color Palette: Deep glacial blues, fiery sunset oranges, and crisp mountain whites.
    rendering:
      font: montserrat
      text_color: "#FFFFFF"
      highlight_color: "#81C784"
      author_color: "#81C784"
      overlay: {type: glass, opacity: 60, color: "#000000", blur: 20}
      text_zone: center
      layout: full_card
      decoration: quote_mark
      highlight_style: italic
      voice_gender: male

  quiet_luxury_minimalist:
