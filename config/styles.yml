styles:

  editorial_chic:
    summary: "Editorial Chic. High-fashion, elegant, well-dressed, confident."
    categories: [womenpower, morning, wisdom]
    weight: high
    description: >
      High-fashion editorial style. Aspirational, elegant, and confident. For women, it should feature beautifully
      dressed, stylish subjects in high-end environments (street style, modern architecture, or minimal studio). 
      Not over-the-top, but undeniably chic and put-together. Clean lines, neutral or sophisticated color palettes.
      Lighting is highly professional, like a Vogue or Harper's Bazaar editorial spread.
    rendering:
      font: montserrat
      font_variants: [montserrat, raleway, oswald, inter, lora]
      text_color: "#FFFFFF"
      author_color: "#D4AF37"
      overlay: {type: gradient_bottom, opacity: 140, color: "#000000", blur: 0}
      text_zone: bottom_minimalist
      layout: minimalist
      decoration: none
      voice_gender: female

  cinematic_mood:
    summary: "Cinematic Mood. Relatable, beautifully lit real-world moments."
    categories: [latenight, wisdom, love, mindfulness]
    weight: high
    description: >
      Cinematic, moody real-world photography. This is not heavily artistic or abstract; it's grounded in reality
      but shot beautifully. Think a quiet coffee shop in the rain, a dimly lit street corner, a person in deep
      thought by a window, or a beautifully rendered object on a desk. The colors are rich and cinematic. 
      Lighting is atmospheric and natural. Highly relatable for a modern youth demographic.
    rendering:
      font: inter
      font_variants: [cormorant, playfair, spectral, inter, merriweather]
      text_color: "#F8F8F8"
      author_color: "#B0B0B0"
      overlay: {type: gradient_top, opacity: 160, color: "#000000", blur: 0}
      text_zone: top_minimalist
      layout: asymmetric
      decoration: rule
      voice_gender: male

  quiet_luxury:
    summary: "Quiet Luxury. Expensive minimalism, natural light, clean space."
    categories: [mindfulness, wisdom, morning, love]
    weight: high
    description: >
      The epitome of 'quiet luxury' and high-end aesthetics. This style relies on beautiful negative space,
      clean architectural lines, soft natural lighting, and high-quality textures (linen, marble, warm wood).
      It feels incredibly expensive but entirely understated. Color palette is strictly neutral (beige, cream,
      slate, soft olive). Very calming, grounded, and modern.
    rendering:
      font: playfair
      font_variants: [playfair, cormorant, outfit, spectral, lora]
      text_color: "#2C2C2C"
      author_color: "#8B7355"
      overlay: {type: glass, opacity: 180, color: "#FFFFFF", blur: 30}
      text_zone: center_minimalist
      layout: minimalist
      decoration: none
      voice_gender: female

  golden_hour_lifestyle:
    summary: "Golden Hour Lifestyle. Warm, inviting, relatable moments."
    categories: [love, morning, mindfulness, wisdom]
    weight: medium
    description: >
      Warm, inviting photography shot during golden hour or with beautiful sun flare. Subjects can be nature,
      animals, or humans in a candid, authentic moment. The focus is on the warmth of the light and a feeling
      of hope or peacefulness. Colors are warm, glowing oranges, soft yellows, and deep shadow contrast.
    rendering:
      font: playfair
      font_variants: [montserrat, poppins, jost, inter, nunito]
      text_color: "#FFFFFF"
      author_color: "#FFD700"
      overlay: {type: gradient_bottom, opacity: 130, color: "#1A0F00", blur: 0}
      text_zone: bottom_minimalist
      layout: big_center
      decoration: none
      voice_gender: female

  monochrome_bold:
    summary: "Monochrome Bold. High contrast B&W, striking silhouettes."
    categories: [wisdom, womenpower, latenight]
    weight: medium
    description: >
      Striking black and white photography with high contrast. Deep, pure blacks and bright, clean whites.
      Focus on strong shapes, silhouettes, and dramatic lighting. Very modern, unapologetic, and powerful.
      Perfect for strong, direct quotes where the visual needs to match the intensity of the words.
    rendering:
      font: cinzel
      font_variants: [cinzel, bebas, oswald, montserrat]
      text_color: "#FFFFFF"
      author_color: "#A0A0A0"
      overlay: {type: none, opacity: 0, color: "#000000", blur: 0}
      text_zone: center
      layout: big_center
      decoration: rule
      voice_gender: male
