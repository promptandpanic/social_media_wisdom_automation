styles:

  frame_within_a_frame:
    summary: "Frame Within a Frame. Unusual camera spot, mid-action, imperfect framing, feels peer-to-peer."
    categories: [womenpower, morning, latenight, wisdom]
    weight: high
    description: >
      Imperfect by design, feeling like a raw peer-to-peer capture rather than a polished ad. 
      Lighting: realistic, unpolished, ambient room or street lighting. Technique: frame within a frame. 
      The camera/perspective is placed in an unusual spot (e.g., behind an object, looking through a gap). 
      Movement tells the brain something is happening — turn the camera on mid-action. 
      Messy, imperfect framing. Color direction: raw, un-color-graded, real-life tones.
      Mood: relatable, authentic, capturing a fleeting moment of truth.
    rendering:
      font: inter
      text_color: "#FFFFFF"
      author_color: "#D4AF37"
      overlay: {type: gradient_bottom, opacity: 120, color: "#000000", blur: 0}
      text_zone: center_minimalist
      layout: big_center
      decoration: none
      voice_gender: female

  dark_mode_neon:
    summary: "Dark Mode Infographic. True black background #000000, high contrast, neon accents."
    categories: [mindfulness, wisdom, latenight]
    weight: high
    description: >
      Dark mode native aesthetic. 70% of users have dark mode on, so this is designed to be seamless.
      Lighting/Technique: The background is predominantly true deep black (#000000) or extremely dark. 
      Lighting is highly constrained, maybe just a stark neon highlight or high-contrast silhouette. 
      Color direction: Minimal color palette—mostly true black and white, but broken by a single, 
      startling neon accent (neon green, vivid hot pink, or electric blue). 
      Mood: tech-forward, modern, stark, honest. "Healing isn't linear" energy.
    rendering:
      font: montserrat
      text_color: "#FFFFFF"
      author_color: "#39FF14"
      overlay: {type: none, opacity: 0, color: "#000000", blur: 0}
      text_zone: center
      layout: minimalist
      decoration: rule
      voice_gender: male

  y2k_nostalgia:
    summary: "Y2K/90s Nostalgia. Early internet, 90s palette, unusual tactile materials."
    categories: [womenpower, love, morning]
    weight: high
    description: >
      A raw 90s/Y2K nostalgia hook that triggers an emotional response before processing content.
      Technique: Flash photography aesthetic, slight disposable camera grain or early digital grit.
      Color direction: 90s color palette, washed-out tones, metallic silvers, or hyper-saturated Y2K pop colors.
      Subject constraints: Unusual materials, e.g., a high-fashion outfit made of VHS tape, bubble wrap, or furby material.
      Mood: Nostalgic, tactile, slightly chaotic, "She's not a throwback. She's a reminder."
      The scene must stop the scroll by feeling like a buried memory or featuring an unexpected texture.
    rendering:
      font: anton
      text_color: "#FAF9F6"
      author_color: "#FF00FF"
      overlay: {type: vignette, opacity: 130, color: "#000000", blur: 0}
      text_zone: top_minimalist
      layout: asymmetric
      decoration: none
      voice_gender: female

  visual_poetry_macro:
    summary: "Visual Poetry Extreme Close-Up. Macro human detail, raw textures, unresolved tension."
    categories: [womenpower, love, mindfulness, latenight]
    weight: high
    description: >
      Visual poetry through extreme, uncomfortable close-up. Not macro nature — macro human. 
      Technique: Cinematic attention to detail in a format that usually rewards speed. 
      Focus on tactile human texture: sweat on a collarbone, cracked lipstick, a tight grip on tearing silk.
      Lighting: intimate, dramatic, emphasizing the physical weight and texture of what is genuinely made.
      Color direction: rich, cinematic, focused on skin tones and physical material.
      Mood: interiority, unresolved tension. "Soft does not mean weak."
    rendering:
      font: playfair
      text_color: "#FFFFFF"
      author_color: "#D4AF37"
      overlay: {type: gradient_bottom, opacity: 150, color: "#000000", blur: 0}
      text_zone: bottom_minimalist
      layout: minimalist
      decoration: none
      voice_gender: female

  pattern_interrupt:
    summary: "Bold Statement Text & Pattern Interrupt. Startling contrast, imperfect."
    categories: [wisdom, morning, womenpower]
    weight: medium
    description: >
      A stark pattern interrupt designed to break the scroll instantly.
      Technique: Imperfect by design. It shouldn't look like an ad; it should look like a raw, 
      urgent message. High contrast, perhaps a slightly blurred background of a chaotic real-world scene,
      leaving maximum room for a bold statement text. 
      Lighting: harsh, direct, or aggressively mundane (fluorescent lighting). 
      Mood: Absolute confidence. "This will change how you see yourself."
    rendering:
      font: bebas
      text_color: "#FFFFFF"
      author_color: "#FF3131"
      overlay: {type: gradient_top, opacity: 150, color: "#000000", blur: 0}
      text_zone: center
      layout: big_center
      decoration: rule
      voice_gender: male
