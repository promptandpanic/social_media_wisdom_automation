styles:

  quiet_luxury_dark:
    summary: "Old money aesthetic, cinematic dark mode, quiet ambition"
    categories: [wisdom, morning, latenight]
    weight: high
    description: >
      The current pinnacle of viral hustle/motivation aesthetics: "Quiet Luxury" and "Old Money."
      Avoid cheap neon or overly flashy sports cars. Think understated, intense, cinematic power.
      Scenes: A vintage Porsche driving through rain, an espresso on a dark marble table overlooking a misty Lake Como,
      a sharply tailored silhouette walking through a grand, dimly lit financial district at dawn,
      or a luxury watch catching a single beam of light in a dark room.
      Lighting: Low-key cinematic lighting, rich shadows, moody atmosphere.
      Color Palette: Deep onyx, charcoal, rich mahogany, muted gold, and storm grey.
      Composition: Must feel incredibly expensive and grounded. Leave a massive dark void in the center for the quote.
    rendering:
      font: bebas
      text_color: "#FFFFFF"
      highlight_color: "#C9A84C"
      author_color: "#C9A84C"
      overlay: {type: gradient_bottom, opacity: 160, color: "#000000"}
      decoration: rule
      highlight_style: color
      skip_kenburns: false
      voice_gender: male

  cinematic_melancholia:
    summary: "Wong Kar-wai style, 35mm film, neon reflections, rainy nights"
    categories: [love, latenight, wisdom]
    weight: high
    description: >
      A deeply emotional, nostalgic 35mm film aesthetic designed for heartbreak, love, and late-night thoughts.
      Think of the visual style of Wong Kar-wai or moody 90s cinema.
      Scenes: A blurry figure seen through a rain-streaked taxi window at night, glowing red tail lights reflecting on wet pavement,
      a lonely figure in a late-night diner bathed in green neon, or two hands slightly apart on a table.
      Lighting: Heavy film grain, bokeh, soft halation, anamorphic lens flares.
      Color Palette: Muted teal, crimson red, amber streetlights, and deep shadows.
      Composition: Highly atmospheric, heavily blurred background, with perfect negative space in the center for profound text.
    rendering:
      font: cormorant
      text_color: "#F0EAE0"
      highlight_color: "#E07070"
      author_color: "#E07070"
      overlay: {type: gradient_bottom, opacity: 150, color: "#000000"}
      decoration: none
      highlight_style: italic
      skip_kenburns: false
      voice_gender: female

  dark_academia_classical:
    summary: "Classical statues, old libraries, gothic shadows, intellectual"
    categories: [wisdom, morning, darkacademia]
    weight: high
    description: >
      The viral "Dark Academia" and stoic philosophy aesthetic, perfect for quotes from Kafka, Nietzsche, or Aurelius.
      Scenes: A dramatic close-up of a classical marble statue (like Marcus Aurelius or an angel) half-swallowed by shadow,
      a dusty beam of light illuminating an ancient library, an ink pen resting on worn leather, or Gothic architecture in the fog.
      Lighting: Chiaroscuro (extreme contrast between light and dark), moody, mysterious.
      Color Palette: Monochrome, pure marble white, deep obsidian black, faded parchment, and dark bronze.
      Composition: Very stark, intellectual, and majestic. Center must be pure shadow or empty wall for the text.
    rendering:
      font: cinzel
      text_color: "#F5F0E8"
      highlight_color: "#C9A84C"
      author_color: "#C9A84C"
      overlay: {type: gradient_bottom, opacity: 150, color: "#000000"}
      decoration: quote_mark
      highlight_style: italic
      skip_kenburns: false
      voice_gender: male

  vast_surreal_scale:
    summary: "Tiny human, massive awe-inspiring landscape (Interstellar/Dune vibes)"
    categories: [mindfulness, goodnight, wisdom]
    weight: medium
    description: >
      A viral visual hook built on awe and scale. A tiny human silhouette against a massive, breathtaking environment.
      Scenes: A solitary figure standing before a massive glowing nebula, walking across infinite mirrored water reflecting the sky,
      standing before a colossal mountain peak at twilight, or watching a gigantic moon rise over a silent ocean.
      Lighting: Ethereal, glowing, atmospheric haze, cinematic rim light.
      Color Palette: Bioluminescent blues, deep space purples, glowing sunset gold, and misty cyan.
      Composition: The subject must be tiny at the very bottom. The center and top must be a vast, glowing, empty sky/space for the text.
    rendering:
      font: cinzel
      text_color: "#E8F4FF"
      highlight_color: "#88CCEE"
      author_color: "#88CCEE"
      overlay: {type: gradient_bottom, opacity: 140, color: "#000000"}
      decoration: none
      highlight_style: color
      skip_kenburns: false
      voice_gender: female

  late_night_drive:
    summary: "Liminal spaces, empty roads, late-night overthinking"
    categories: [latenight, mindfulness]
    weight: medium
    description: >
      The ultimate aesthetic for 3 AM thoughts and overthinking.
      Scenes: The view from the driver's seat of an empty highway illuminated only by headlights,
      a solitary gas station glowing in the middle of nowhere, a quiet city skyline viewed from an empty balcony,
      or staring up at streetlamps cutting through dense fog.
      Lighting: Artificial, moody, isolating but peaceful.
      Color Palette: Midnight blue, sodium-vapor orange (streetlights), fog grey, and pitch black.
      Composition: Very atmospheric, highly relatable. Center must be a calm, dark void for text.
    rendering:
      font: montserrat
      text_color: "#E0E0E0"
      highlight_color: "#6CB8D0"
      author_color: "#6CB8D0"
      overlay: {type: gradient_bottom, opacity: 160, color: "#000000"}
      decoration: none
      highlight_style: color
      skip_kenburns: false
      voice_gender: male

  cinematic_female_protagonist:
    summary: "Main character energy, elegant, fearless woman in cinematic lighting"
    categories: [womenpower, love, wisdom]
    weight: high
    description: >
      A high-end cinematic aesthetic focusing on a confident, independent woman—radiating "main character energy."
      Scenes: A woman in a trench coat walking away down a misty cobblestone street,
      a sophisticated silhouette looking out a high-rise window at the city lights,
      fixing her hair in the rearview mirror of a classic car, or a quiet, powerful portrait in soft golden hour light.
      Lighting: Flattering, dramatic, soft studio or golden hour.
      Color Palette: Warm neutrals, elegant beige, deep emerald, or classic black-and-white.
      Composition: Must look like a still from an Oscar-winning drama or Vogue cover. Center must remain entirely open for text.
    rendering:
      font: cinzel
      text_color: "#F5F0EB"
      highlight_color: "#C0395A"
      author_color: "#C0395A"
      overlay: {type: gradient_bottom, opacity: 130, color: "#000000"}
      decoration: none
      highlight_style: color
      skip_kenburns: true
      voice_gender: female
