styles:

  quiet_luxury_dark:
    summary: "Vibrant luxury lifestyle, bright aesthetic, wealthy morning"
    categories: [wisdom, morning, latenight]
    weight: high
    description: >
      A bright, vibrant, and highly aesthetic luxury lifestyle. Extremely cheerful and aspirational.
      Think of an expensive modern apartment with floor-to-ceiling windows, sunlight pouring in, a perfectly made espresso,
      or a beautiful high-end resort overlooking crystal clear water.
      Lighting: Bright, natural sunlight, highly realistic, 35mm film photography style.
      Color Palette: Bright whites, warm gold, azure blue, lush green.
      Composition: Clean, modern, highly relatable lifestyle shot. Leave a clear space in the center for the quote.
    rendering:
      font: poppins
      text_color: "#FFFFFF"
      highlight_color: "#FFD700"
      author_color: "#FFD700"
      overlay: {type: gradient_center, opacity: 110, color: "#000000"}
      decoration: none
      highlight_style: color
      skip_kenburns: false
      voice_gender: male

  cinematic_melancholia:
    summary: "Bright & cozy morning, warm sunlight, coffee shop vibes"
    categories: [love, latenight, wisdom]
    weight: high
    description: >
      A highly cheerful, cozy, and vibrant morning aesthetic. Highly relatable and warm.
      Scenes: A beautiful cup of latte art bathed in warm golden hour sunlight on a wooden table,
      a cozy reading nook with string lights and plants, or two hands holding coffee in a bright, aesthetic cafe.
      Lighting: Warm, glowing, sunny, soft natural light, highly realistic photography.
      Color Palette: Warm amber, soft peach, vibrant whites, and pastel tones.
      Composition: Highly atmospheric but positive and cozy. Center must be slightly shaded or clear for text.
    rendering:
      font: nunito
      text_color: "#FFFFFF"
      highlight_color: "#FF9E80"
      author_color: "#FF9E80"
      overlay: {type: gradient_bottom, opacity: 130, color: "#000000"}
      decoration: none
      highlight_style: italic
      skip_kenburns: false
      voice_gender: female

  dark_academia_classical:
    summary: "Modern minimalist desk, bright study, clean aesthetic"
    categories: [wisdom, morning, darkacademia]
    weight: high
    description: >
      A very clean, bright, and modern minimalist aesthetic. Relatable for students or ambitious professionals.
      Scenes: A pristine modern desk setup with an open notebook, a sleek pen, and natural sunlight streaming over it,
      or a beautiful bright library with white marble and plants.
      Lighting: Bright, airy, crisp, realistic daylight.
      Color Palette: Pure white, soft beige, light oak, and subtle greens.
      Composition: Very clean and organized. Center must have negative space for text.
    rendering:
      font: montserrat
      text_color: "#FFFFFF"
      highlight_color: "#81C784"
      author_color: "#81C784"
      overlay: {type: gradient_center, opacity: 120, color: "#000000"}
      decoration: none
      highlight_style: italic
      skip_kenburns: false
      voice_gender: male

  vast_surreal_scale:
    summary: "Beautiful nature aesthetics, vibrant sunsets, awe-inspiring"
    categories: [mindfulness, goodnight, wisdom]
    weight: medium
    description: >
      Awe-inspiring, vibrant, and stunning real-world nature photography. Highly realistic and breathtaking.
      Scenes: A vibrant golden-hour sunset over a calm ocean, a crystal-clear mountain lake reflecting a bright blue sky,
      or a beautiful flower field in the spring.
      Lighting: Golden hour, vibrant, clear, hyper-realistic.
      Color Palette: Vibrant orange, deep pinks, bright cyan, and lush greens.
      Composition: Vast and beautiful landscape. Center must be clear for text overlay.
    rendering:
      font: raleway
      text_color: "#FFFFFF"
      highlight_color: "#FFD54F"
      author_color: "#FFD54F"
      overlay: {type: gradient_center, opacity: 120, color: "#000000"}
      decoration: none
      highlight_style: color
      skip_kenburns: false
      voice_gender: female

  late_night_drive:
    summary: "Cozy neon city lights, inviting late-night vibes"
    categories: [latenight, mindfulness]
    weight: medium
    description: >
      A highly relatable, aesthetic late-night city vibe. Not depressing, but reflective and beautiful.
      Scenes: Looking out a high-rise window at glowing city lights, a cozy car interior driving through a vibrant neon city,
      or a beautiful late-night diner that feels safe and warm.
      Lighting: Vibrant neon, cinematic but realistic, 35mm film photography.
      Color Palette: Vibrant magenta, glowing cyan, warm gold, deep navy.
      Composition: Center must be a calm, slightly darker space for text readability.
    rendering:
      font: lato_bold
      text_color: "#FFFFFF"
      highlight_color: "#64B5F6"
      author_color: "#64B5F6"
      overlay: {type: gradient_bottom, opacity: 140, color: "#000000"}
      decoration: none
      highlight_style: color
      skip_kenburns: false
      voice_gender: male

  cinematic_female_protagonist:
    summary: "Attractive, confident, vibrant female lifestyle"
    categories: [womenpower, love, wisdom]
    weight: high
    description: >
      A stunning, highly attractive, and confident female protagonist in a vibrant lifestyle setting.
      Scenes: A beautiful young woman walking confidently in a bright, sunlit European city,
      smiling genuinely in a beautiful sun-drenched cafe, or a highly aesthetic, cheerful fashion lifestyle shot.
      Lighting: Flattering, bright, golden hour or soft natural daylight, highly realistic and appealing.
      Color Palette: Warm peach, bright whites, vibrant reds, or soft pinks.
      Composition: Like a high-end Vogue lifestyle shot, extremely cheerful and aspirational. Center open for text.
    rendering:
      font: playfair
      text_color: "#FFFFFF"
      highlight_color: "#F06292"
      author_color: "#F06292"
      overlay: {type: gradient_bottom, opacity: 130, color: "#000000"}
      decoration: none
      highlight_style: color
      skip_kenburns: false
      voice_gender: female
