# Image generation provider configuration
# Keys come from .env / GitHub Secrets — not here

providers:
  leonardo_flux_pro:
    class: wisdom.providers.image.LeonardoFluxProProvider
    key_env: LEONARDO_API_KEY
    timeout: 120

  gemini_flash:
    class: wisdom.providers.image.GeminiFlashProvider
    model: gemini-3.5-flash-image
    key_env: GEMINI_API_KEY
    timeout: 60

  gemini_imagen:
    class: wisdom.providers.image.GeminiImagenProvider
    model: imagen-4.0-generate-001
    key_env: GEMINI_API_KEY
    timeout: 60


  huggingface:
    class: wisdom.providers.image.HuggingFaceProvider
    model: black-forest-labs/FLUX.1-schnell
    key_env: HF_API_KEY
    timeout: 60

  pollinations:
    class: wisdom.providers.image.PollinationsProvider
    # No key needed
    timeout: 30

  gradient:
    class: wisdom.providers.image.GradientFallback
    # Zero-dependency PIL fallback — always works

# Tried left-to-right; first success wins.
fallback_chain: [gemini_imagen, leonardo_flux_pro, gemini_flash, huggingface, pollinations, gradient]
