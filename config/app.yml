# Application-level settings — no secrets here
# All API keys go in .env / GitHub Secrets

app:
  recent_posts_window_days: 30  # days of posted quotes to send to LLM as context

  # Per-platform handles — used in captions, not injected into LLM prompts
  platforms:
    instagram:
      handle: "@your_instagram_handle"
    youtube:
      handle: "@your_youtube_handle"
  output_dir: output
  pending_dir: data/pending
  db_path: data/wisdom.db

  design_attempts: 3        # max image generation retries before using best result
  judge_threshold: 7        # minimum score (1–10) to accept image without retry

image:
  width: 1080
  height: 1920                  # 9:16 portrait for Reels / Shorts

reel:
  duration_sec: 23
  fps: 30
  audio_file: assets/audio/background.mp3
  music_volume: 0.15            # 0.0–1.0 when no TTS voice

