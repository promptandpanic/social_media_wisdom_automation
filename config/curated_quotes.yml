    - text: "End each day with a grateful heart."
      author: "Unknown"
    - text: "Some nights are made for torture, and some for prayer, and some for nothing but sleep."
      author: "Unknown"
    - text: "The day is over. You survived. Rest now."
      author: "Unknown"
      highlight: "you survived"
    - text: "Even the darkest night will end and the sun will rise."
      author: "Victor Hugo"
      highlight: "the sun will rise"
    - text: "Give every day the chance to become the most beautiful day of your life."
      author: "Mark Twain"
    - text: "Goodnight, and great love to you from us all."
      author: "Brian Aldiss"
    - text: "Sleep tight, dream big, and never forget you are loved."
      author: "Unknown"
    - text: "Take care of your inner world as much as you care for the outer."
      author: "Unknown"
    - text: "Stars can't shine without darkness."
      author: "Unknown"
      highlight: "can't shine without darkness"
    - text: "Forgive yourself for what today wasn't. Show up again tomorrow."
      author: "Unknown"
      highlight: "show up again tomorrow"
    - text: "Every sunset is an invitation to reset."
      author: "Richie Norton"
    - text: "The day is done, and its toils and its cares put to rest."
      author: "Henry Wadsworth Longfellow"
    - text: "Grant yourself the mercy of a peaceful night."
      author: "Unknown"
    - text: "Rest is not laziness. It is medicine."
      author: "Unknown"
      highlight: "rest is medicine"
    - text: "Gratitude can transform common days into thanksgivings."
      author: "William Arthur Ward"
    - text: "The quietness of night is never truly silent. It is full of a calm you rarely give yourself permission to feel."
      author: "Unknown"
      highlight: "calm you rarely give yourself"
    - text: "Close your eyes tonight knowing that you did your part."
      author: "Unknown"
    - text: "Tomorrow morning will be a fresh start. Let tonight be a soft landing."
      author: "Unknown"
      highlight: "soft landing"
    - text: "It's okay to not be okay. Tomorrow is a new chance."
      author: "Unknown"
    - text: "The smallest good act of today makes tomorrow slightly better."
      author: "Unknown"
    - text: "Put your worries to bed. They can wait until morning — and by morning most of them won't matter."
      author: "Unknown"
      highlight: "most of them won't matter"
    - text: "Be proud of yourself tonight. You carried a lot today."
      author: "Unknown"
      highlight: "you carried a lot today"
    - text: "The night is the hardest time to be alive and 4am knows all my secrets."
      author: "Poppy Z. Brite"
    - text: "One day you will look back at today and realise it was one of the good ones."
      author: "Unknown"
    - text: "Close the day with grace. Open the tomorrow with hope."
      author: "Unknown"
    - text: "Let the end of today remind you that beginnings always follow."
      author: "Unknown"
    - text: "The world can wait until morning. Tonight, just rest."
      author: "Unknown"
      highlight: "tonight, just rest"
    - text: "The day asked a lot of you. You gave what you could. That matters."
      author: "Unknown"
      highlight: "you gave what you could"
    - text: "Softness is strength. Choosing to rest is choosing to return tomorrow."
      author: "Unknown"
    - text: "You are not behind. You are not failing. You are in the middle of the story."
      author: "Unknown"
      highlight: "in the middle of the story"
    - text: "Three things to be grateful for, even on the hardest days: today, breath, and the fact that you tried."
      author: "Unknown"
      highlight: "the fact that you tried"
    - text: "There will be a morning after this night. Hold on."
      author: "Unknown"
    - text: "End the day lighter than you started it. Let something go."
      author: "Unknown"
    - text: "You didn't have to be perfect today. You just had to show up."
      author: "Unknown"
      highlight: "you just had to show up"
    - text: "The bravest thing you can do some days is make it to bedtime."
      author: "Unknown"
    - text: "Sleep is the reset button life forgot to tell you about."
      author: "Unknown"
    - text: "On particularly rough days when I'm sure I can't possibly endure, I remind myself that my track record for getting through bad days is perfect."
      author: "Unknown"
      highlight: "track record is perfect"

  latenight:
    - text: "At 2 AM, everything feels like the end of the world. At 10 AM, it feels manageable. Wait for 10 AM."
      author: "Unknown"
      highlight: "wait for 10 AM"
    - text: "Loneliness is the human condition. No one is ever going to fill that space."
      author: "Janet Fitch"
    - text: "I exist in two places, here and where you are."
      author: "Margaret Atwood"
    - text: "The loneliest moment in someone's life is when they are watching their whole world fall apart."
      author: "F. Scott Fitzgerald"
      highlight: "whole world fall apart"
    - text: "Do you ever just crave someone's presence? Not even anything physical, just their being there."
      author: "Unknown"
      highlight: "just their being there"
    - text: "She was a girl who knew how to be happy even when she was sad. And that's important."
      author: "Marilyn Monroe"
      highlight: "happy even when she was sad"
    - text: "It's okay to be a glowstick — sometimes we have to break before we can shine."
      author: "Unknown"
    - text: "The most painful thing is losing yourself in the process of loving someone too much."
      author: "Ernest Hemingway"
      highlight: "losing yourself"
    - text: "You were not born to hustle 24/7. You were born to live."
      author: "Unknown"
    - text: "Sometimes you have to stand alone to prove that you can still stand."
      author: "Unknown"
    - text: "I am learning to love the sound of my feet walking away from things not meant for me."
      author: "Unknown"
      highlight: "walking away from things not meant for me"
    - text: "The trouble is, you think you have time."
      author: "Unknown (attributed to Buddha)"
      highlight: "you think you have time"
    - text: "I am not what happened to me. I am what I choose to become."
      author: "Carl Jung"
    - text: "One day, in retrospect, the years of struggle will strike you as the most beautiful."
      author: "Sigmund Freud"
      highlight: "the most beautiful"
    - text: "It's 3am and I'm still awake because I keep thinking about all the things I should have said."
      author: "Unknown"
      highlight: "all the things I should have said"
    - text: "You are so used to your features, you don't know how beautiful you look to a stranger."
      author: "Unknown"
    - text: "I think about you constantly, whether it's with my brain or my heart."
      author: "Terri Guillemets"
    - text: "The scariest thing about distance is you don't know whether they'll miss you or forget you."
      author: "Nicholas Sparks"
      highlight: "miss you or forget you"
    - text: "Nostalgia is a dirty liar that insists things were better than they seemed."
      author: "Michelle K."
      highlight: "things were better than they seemed"
    - text: "You are allowed to be both a mess and a masterpiece at the same time."
      author: "Unknown"
    - text: "Not all wounds are visible. Not all battles are loud."
      author: "Unknown"
      highlight: "not all battles are loud"
    - text: "The worst kind of sad is not being able to explain why."
      author: "Unknown"
    - text: "Missing someone is your heart's way of reminding you that you love them."
      author: "Unknown"
    - text: "Sometimes the people who are thousands of miles away can make you feel better than people right beside you."
      author: "Unknown"
    - text: "I am not afraid of the dark. I am afraid of the thoughts I have in it."
      author: "Unknown"
      highlight: "thoughts I have in it"
    - text: "You were my cup of tea, but I drink coffee now."
      author: "Unknown"
    - text: "Maybe one day I'll be what you need. But don't wait too long, because the day you want me may be the day I've finally given up."
      author: "Unknown"
      highlight: "the day I've finally given up"
    - text: "The saddest word in the whole wide world is the word almost."
      author: "Franka Potente"
      highlight: "the word almost"
    - text: "Crying is how your heart speaks when your lips can't explain the pain you feel."
      author: "Unknown"
    - text: "Some people come into our lives and leave footprints on our hearts. Others come and we have to wipe our damn floors."
      author: "Unknown"
    - text: "The sun will rise and we will try again."
      author: "Twenty One Pilots"
      highlight: "we will try again"
    - text: "I am always doing that which I cannot do, in order that I may learn how to do it."
      author: "Pablo Picasso"
    - text: "There comes a day when you realise turning the page is the best feeling in the world, because you realise there is so much more to the book."
      author: "Zayn Malik"
      highlight: "so much more to the book"
    - text: "Everybody has a chapter they don't read out loud."
      author: "Unknown"
      highlight: "chapter they don't read out loud"
    - text: "She made broken look beautiful and strong look invincible. She walked with the universe on her shoulders and made it look like a pair of wings."
      author: "Ariana Dancu"
      highlight: "made it look like a pair of wings"
    - text: "I'm tired of fighting. For once, I want to be fought for."
      author: "Unknown"
      highlight: "I want to be fought for"
    - text: "You know what's wrong with you, Miss Whoever You Are? You're chicken. You've got no guts. You're afraid to stick out your chin and say 'Okay, life's a fact, people do fall in love, people do belong to each other.'"
      author: "Truman Capote, Breakfast at Tiffany's"
    - text: "That's the thing about pain. It demands to be felt."
      author: "John Green, The Fault in Our Stars"
      highlight: "demands to be felt"
    - text: "I want to be with those who know secret things or else alone."
      author: "Rainer Maria Rilke"
    - text: "Maybe the journey isn't so much about becoming anything. Maybe it's about unbecoming everything that isn't really you."
      author: "Unknown"
      highlight: "unbecoming everything that isn't you"
    - text: "If it makes you happy, it doesn't have to make sense to others."
      author: "Unknown"
    - text: "You've survived 100% of your worst days so far."
      author: "Unknown"
      highlight: "survived 100% of your worst days"
    - text: "It's okay to outgrow people. Not everyone is meant to come with you."
      author: "Unknown"
      highlight: "not everyone is meant to come with you"
    - text: "Your current situation is not your final destination."
      author: "Unknown"
    - text: "I hope you know that you deserve more than what you are willing to accept."
      author: "Unknown"
      highlight: "more than you are willing to accept"
    - text: "You'll be okay. You've been okay before and you'll be okay again."
      author: "Unknown"
      highlight: "you've been okay before"
    - text: "The world is too quiet without you nearby."
      author: "Lemony Snicket"
    - text: "There is a particular kind of grief in slowly realising someone is not who you thought they were."
      author: "Unknown"
      highlight: "not who you thought they were"
    - text: "Sometimes I feel everything at once and sometimes I feel absolutely nothing. I don't know which is worse."
      author: "Unknown"
      highlight: "everything at once or nothing"
    - text: "You don't always have to explain yourself. Some people don't deserve access to your story."
      author: "Unknown"
      highlight: "access to your story"

  womenpower:
    - text: "She was tired. Not the sleepy kind. The kind that rest doesn't fix."
      author: "Unknown"
      highlight: "the kind rest doesn't fix"
    - text: "She said I'm fine so many times she almost forgot she wasn't."
      author: "Unknown"
      highlight: "almost forgot she wasn't"
    - text: "She loved him. He loved the idea of her. The gap between those two things broke her."
      author: "Unknown"
      highlight: "the gap broke her"
    - text: "She didn't leave angry. She left quietly, which was so much worse."
      author: "Unknown"
      highlight: "which was so much worse"
    - text: "She knew. She just wasn't ready to know yet."
      author: "Unknown"
      highlight: "not ready to know yet"
    - text: "She kept giving chances because she kept seeing potential. The potential was never the person."
      author: "Unknown"
      highlight: "never the person"
    - text: "She cried in the car again. That's where the real conversations happen."
      author: "Unknown"
      highlight: "real conversations happen"
    - text: "She chose herself. It felt selfish for about three days. Then it felt like oxygen."
      author: "Unknown"
      highlight: "then it felt like oxygen"
    - text: "She's everyone's safe place. She wishes she had one too."
      author: "Unknown"
      highlight: "she wishes she had one too"
    - text: "She read the message. She just needed a minute before she could pretend it didn't hurt."
      author: "Unknown"
      highlight: "pretend it didn't hurt"
    - text: "She stopped waiting. Not because she didn't care. Because she cared too much to keep going."
      author: "Unknown"
      highlight: "cared too much to keep going"
    - text: "She laughed it off. She's very good at that."
      author: "Unknown"
      highlight: "very good at that"
    - text: "The moment she understood her worth, the room got quieter."
      author: "Unknown"
      highlight: "understood her worth"
    - text: "She healed quietly. Not because the pain was small but because she was strong."
      author: "Unknown"
      highlight: "healed quietly"
    - text: "She was tired of convincing people to love her the way she deserved."
      author: "Unknown"
      highlight: "convincing people to love her"
    - text: "Her softness was never weakness. It was a choice she made for herself, not for anyone else."
      author: "Unknown"
      highlight: "softness was never weakness"
    - text: "She stopped shrinking herself to fit into spaces that were never meant for her."
      author: "Unknown"
      highlight: "stopped shrinking herself"
    - text: "One day she realised that what felt like love was mostly fear of being alone."
      author: "Unknown"
      highlight: "fear of being alone"
    - text: "She is not waiting to be saved. She is learning to save herself."
      author: "Unknown"
      highlight: "learning to save herself"
    - text: "She outgrew the version of herself that needed their approval to feel whole."
      author: "Unknown"
      highlight: "needed their approval"
    - text: "There is no bravery quite like the kind that happens in private."
      author: "Unknown"
      highlight: "bravery in private"
    - text: "She had a softness that people confused for permission. She stopped letting them."
      author: "Unknown"
      highlight: "confused for permission"
    - text: "She forgave easily. That was not her weakness. Forgetting who showed her was."
      author: "Unknown"
      highlight: "forgetting who showed her"
    - text: "Being loved half-heartedly taught her what wholehearted love should feel like."
      author: "Unknown"
      highlight: "loved half-heartedly"
