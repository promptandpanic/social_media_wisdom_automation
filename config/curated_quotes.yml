# Curated quotes for @_daily_dose_of_wisdom__
# Used as fallback when Gemini is unavailable, and ~20% of normal posts for variety.
#
# Format:
#   text:      the quote exactly as it should appear (keep under 30 words)
#   author:    display name (shown small below quote)
#   highlight: optional — 3-6 most powerful consecutive words
#              if omitted, extracted automatically
#
# 50 quotes per category. Mix of attributed and Unknown.
# Avoid overexposed clichés — prefer emotional, save-worthy, rare.

quotes:

