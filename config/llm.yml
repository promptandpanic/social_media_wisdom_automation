# LLM provider configuration
# Keys come from .env / GitHub Secrets — not here
#
# Model strings use LiteLLM format — changing provider = change model name only:
#   gemini/gemini-3.5-flash  →  anthropic/claude-opus-4-7
#   see: https://docs.litellm.ai/docs/providers

providers:
  deepseek:
    model: deepseek/deepseek-v4-pro
    key_env: DEEPSEEK_API_KEY
  kimi:
    model: moonshot/moonshot-v1-32k
    key_env: MOONSHOT_API_KEY
  gemini:
    model: gemini/gemini-3.5-flash
    key_env: GEMINI_API_KEY
  huggingface:
    model: huggingface/Qwen/Qwen2.5-7B-Instruct
    key_env: HF_API_KEY

# Per-role temperature/token settings.
# deepseek runs first for text roles, falls back to kimi, then gemini.
# image_judge stays gemini-only — deepseek chat has no vision support.
roles:
  quote_generation:
    providers: [deepseek, kimi, gemini]
    temperature: 1.0
    max_tokens: 8192
    disable_thinking: true

  style_picker:
    providers: [deepseek, kimi, gemini]
    temperature: 1.0
    max_tokens: 2048
    disable_thinking: true

  creative_brief:
    providers: [deepseek, kimi, gemini]
    temperature: 1.0
    max_tokens: 8192

  image_judge:
    providers: [gemini]
    temperature: 1.0
    max_tokens: 1024
