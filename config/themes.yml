# Theme configuration — adding a new theme = add a block here, zero Python needed.
#
# Fields:
#   name          Display name
#   ist_time      IST posting time (HH:MM)
#   utc_cron      GitHub Actions cron expression (IST = UTC+5:30)
#   format        reel | image  (reel = video with Ken Burns, image = static)
#   max_words     Hard limit on quote word count
#   platforms     Which platforms to post to: instagram | youtube
#   hashtags      Instagram caption hashtags (3-5 recommended)
#   youtube       YouTube-specific metadata (required if youtube in platforms)
#   styles        Optional: lock theme to specific style names (else all applicable styles)
#   enabled       Set false to pause without deleting

themes:

  morning:
    name: Morning Motivation
    format: reel
    max_words: 18
    platforms: [instagram, youtube]
    hashtags: ["#MorningVibes", "#WorkoutMotivation", "#FreshStart", "#DailyDiscipline", "#SuccessMindset", "#FitnessAesthetic"]
    youtube:
      title_template: "Morning Motivation"
      tags: ["morning motivation", "daily stoic", "mindset mastery", "philosophical quotes", "success mindset", "daily quotes"]
      category_id: "22"
      privacy: public
    enabled: true

