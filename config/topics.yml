# Quote topic configuration
# Strategy: Pure algorithmic engagement. 
# We are abandoning generic advice and focusing entirely on high-virality psychological hooks:
# Villain arc, brutal truths, dark feminine, modern heartbreak, and silent boundaries.

categories:

  morning:
    name: "The Villain Arc / Obsession"
    max_words: 16
    brief: >
      Extreme, uncompromising obsession. Going ghost to build an empire. The cold, calculated decision to outwork everyone who doubted you. 
      This isn't "good morning" motivation; this is "Villain Arc" discipline. Emotional detachment, hyper-focus, and the realization that nobody is coming to save you.
      Absolutely no generic hustle quotes. Must feel dangerous, quiet, and ruthlessly ambitious.

    featured_authors:
      - name: "David Goggins"
        note: "Taking souls, absolute suffering, callous your mind"
      - name: "Naval Ravikant"
        note: "Cold, calculating truth about wealth and status"
      - name: "Marcus Aurelius"
        note: "Stoic indifference to the opinions of the weak"
      - name: "Robert Greene"
        note: "Author of 48 Laws of Power — human nature, strategy, power dynamics"
      - name: "Kobe Bryant"
        note: "Psychopathic obsession with winning and the craft"

  wisdom:
    name: "Brutal Psychological Truths"
    max_words: 22
    brief: >
      Uncomfortable, harsh realities about human psychology, betrayal, and outgrowing your circle. 
      The pain of realizing people don't love you, they love what they can extract from you. The cost of being too loyal. 
      Must make the reader stop scrolling because it exposes a truth they were trying to ignore. Dark, profound, and deeply cynical but ultimately liberating.

    featured_authors:
      - name: "Friedrich Nietzsche"
        note: "The abyss, the will to power, dismantling morality"
      - name: "Carl Jung"
        note: "The shadow self, the dark side of human nature"
      - name: "Niccolò Machiavelli"
        note: "The reality of human selfishness and power"
      - name: "Seneca"
        note: "The brevity of life, the foolishness of people"
      - name: "Arthur Schopenhauer"
        note: "Pessimism, the suffering of existence, the illusion of happiness"

  love:
    name: "Modern Heartbreak & Detachment"
    max_words: 24
    brief: >
      The excruciating pain of silent detachment. Realizing you fought for someone who was okay with losing you.
      The exhaustion of situationships, unspoken goodbyes, and the grief of outgrowing someone you once loved.
      Must focus on *walking away*, *unrequited loyalty*, and *healing in silence*. No sweet romance. This is for the broken-hearted who need closure.

    featured_authors:
      - name: "Esther Perel"
        note: "The reality of modern betrayal and emotional distance"
      - name: "Warsan Shire"
        note: "Visceral, raw pain of not being enough, cutting ties"
      - name: "Lang Leav"
        note: "The quiet ache of someone who doesn't care anymore"
      - name: "Charles Bukowski"
        note: "Cynical, whiskey-soaked heartbreak and loneliness"
      - name: "R.M. Drake"
        note: "The messy, painful process of letting go"

  mindfulness:
    name: "Protecting Your Peace / Ruthless Boundaries"
    max_words: 18
    brief: >
      The power of becoming unreachable. Cutting off toxic family or friends without an explanation.
      Finding peace by refusing to entertain disrespect. The "Healing Era" aesthetic: protecting your energy with absolute ruthlessness.
      Not about meditation or breathing—about boundaries made of steel.

    featured_authors:
      - name: "Brianna Wiest"
        note: "Self-sabotage, outgrowing your old self, setting absolute boundaries"
      - name: "Eckhart Tolle"
        note: "The ego, detaching from toxic drama"
      - name: "Osho"
        note: "Radical independence, not caring what others think"
      - name: "Pema Chödrön"
        note: "Leaning into the pain of disappointing others to save yourself"

  goodnight:
    name: "Late Night Existentialism"
    max_words: 22
    brief: >
      The crushing weight of 3 AM overthinking. The realization that time is slipping away.
      The silent battles you fight entirely alone in your bedroom. 
      Must feel deeply melancholic, nostalgic, and solitary.

    featured_authors:
      - name: "Haruki Murakami"
        note: "Urban loneliness, 3AM thoughts, the surreal emptiness of night"
      - name: "Franz Kafka"
        note: "Existential dread, isolation, the weight of being alive"
      - name: "Virginia Woolf"
        note: "The heavy, internal silence of the mind"
      - name: "Sylvia Plath"
        note: "The raw, overwhelming exhaustion of existence"

  latenight:
    name: "The Silent Battles"
    max_words: 24
    brief: >
      Grief, burnout, and the exhaustion of having to be strong all the time. 
      The mask you wear during the day finally slipping off at night. 
      The quiet desperation of wanting to disappear and start over completely.

    featured_authors:
      - name: "Albert Camus"
        note: "The absurdity of the daily grind, the desire to escape"
      - name: "Fernando Pessoa"
        note: "The Book of Disquiet, absolute alienation from society"
      - name: "Atticus"
        note: "The unsaid words, the secret pain"
      - name: "Charles Bukowski"
        note: "The absolute drudgery of modern life"

  womenpower:
    name: "Dark Feminine Energy"
    max_words: 18
    brief: >
      Untouchable, unapologetic Dark Feminine energy. 
      The power of walking away. Intimidation as a superpower. Refusing to shrink, apologize, or beg.
      The realization that your absence is your ultimate weapon. Must be ruthless, glamorous, and dangerous. Absolutely no "girl boss" clichés.

    featured_authors:
      - name: "Frida Kahlo"
        note: "Surviving pain, ruthless self-expression, fire"
      - name: "Cleopatra"
        note: "Absolute dominance, strategy, feminine power"
      - name: "Bell Hooks"
        note: "Radical self-love, refusing to conform to male gaze"
      - name: "Anaïs Nin"
        note: "Unapologetic desire, complexity, dark emotional depths"
      - name: "Megan Fox"
        note: "Modern dark feminine icons, boundary setting, self-awareness"
