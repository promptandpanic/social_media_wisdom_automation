  wisdom:
    name: "Brutal Psychological Truths"
    max_words: 22
    brief: >
      Uncomfortable, harsh realities about human psychology, betrayal, and outgrowing your circle. 
      The pain of realizing people don't love you, they love what they can extract from you. The cost of being too loyal. 
      Must make the reader stop scrolling because it exposes a truth they were trying to ignore. Dark, profound, and deeply cynical but ultimately liberating.

