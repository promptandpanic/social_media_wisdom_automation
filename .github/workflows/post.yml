name: Post Quotes

on:
  workflow_dispatch:
    inputs:
      theme:
        description: 'Theme to post'
        required: true
        type: choice
        options: [morning, rotating, wisdom, love, mindfulness, darkacademia, latenight, womenpower]
      offline:
        description: 'Offline mode (use curated quotes, skip LLM)'
        required: false
        type: boolean
        default: false

permissions:
  contents: write

jobs:
  post:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install system dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y ffmpeg

      - name: Install Python dependencies
        run: pip install -r requirements.txt

      - name: Pre-download fonts
        run: python3 -c "from wisdom.composers.card import _ensure_fonts; _ensure_fonts()"

      - name: Ensure media-pool release exists
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release view media-pool 2>/dev/null || \
          gh release create media-pool \
            --title "Media Pool" \
            --notes "Auto-managed CDN bucket for Instagram uploads." \
            --prerelease

      - name: Resolve theme
        id: theme
        run: |
          INPUT="${{ github.event.inputs.theme }}"
          if [ "$INPUT" = "rotating" ]; then
            THEMES=(wisdom love mindfulness darkacademia)
            IDX=$(( $(date +%j) % 4 ))
            echo "name=${THEMES[$IDX]}" >> $GITHUB_OUTPUT
          else
            echo "name=$INPUT" >> $GITHUB_OUTPUT
          fi

      - name: Run pipeline — ${{ steps.theme.outputs.name }}
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          LEONARDO_API_KEY: ${{ secrets.LEONARDO_API_KEY }}
          HF_API_KEY: ${{ secrets.HF_API_KEY }}
          INSTAGRAM_ACCESS_TOKEN: ${{ secrets.INSTAGRAM_ACCESS_TOKEN }}
          INSTAGRAM_BUSINESS_ID: ${{ secrets.INSTAGRAM_BUSINESS_ID }}
          YOUTUBE_CLIENT_ID: ${{ secrets.YOUTUBE_CLIENT_ID }}
          YOUTUBE_CLIENT_SECRET: ${{ secrets.YOUTUBE_CLIENT_SECRET }}
          YOUTUBE_REFRESH_TOKEN: ${{ secrets.YOUTUBE_REFRESH_TOKEN }}
          SMTP_USER: ${{ secrets.SMTP_USER }}
          SMTP_PASS: ${{ secrets.SMTP_PASS }}
          EMAIL_RECIPIENT: ${{ secrets.EMAIL_RECIPIENT }}
          GITPROVIDER_TOKEN: ${{ secrets.GITPROVIDER_TOKEN }}
          GITPROVIDER_REPO: ${{ github.repository }}
        run: |
          OFFLINE_FLAG=""
          if [ "${{ github.event.inputs.offline }}" = "true" ]; then
            OFFLINE_FLAG="--offline"
          fi
          python -m wisdom.cli run ${{ steps.theme.outputs.name }} $OFFLINE_FLAG
